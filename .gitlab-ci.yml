stages:
  - build
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.default_python:
  image: python:3.10
  before_script:
    - python --version
    - python -m pip install --upgrade pip build scikit-build-core pybind11 numpy

# Native build on a Jetson/aarch64 runner tagged "jetson".
build:wheel:aarch64:
  stage: build
  tags:
    - jetson
  extends: .default_python
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends libnvvpi3 vpi3-dev cmake ninja-build
    - python -m pip install build
    - python -m build --wheel
    - python -m pip install ".[dev]" dist/*.whl
    - pytest -m vpi
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH

publish:aruw_pypi:
  stage: publish
  image: python:3.10
  needs:
    - job: build:wheel:aarch64
      artifacts: true
  script:
    - python -m pip install twine
    - |
      twine upload \
        --repository-url "${CI_API_V4_URL}/groups/9205524/-/packages/pypi" \
        -u gitlab-ci-token \
        -p "${CI_JOB_TOKEN}" \
        dist/*.whl
  rules:
    - if: $CI_COMMIT_TAG
